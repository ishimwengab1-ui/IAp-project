!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ Company</title>
    <style>
        body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.header {
    background: #140a5c;
    color: white;
    text-align: center;
    padding: 40px;
}

.card {
    background: white;
    width: 70%;
    margin: -40px auto;
    padding: 25px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 5px 15px rgba(49, 46, 46, 0.1);
    flex-wrap: wrap;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin: 10px;
}

input, select {
    padding: 10px;
    width: 150px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #140a5c;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    text-align: center;
}
    </style>
</head>
<body>

    <div class="header">
        <h1>XYZ-COMPANY</h1>
        <p>CURRENCY EXCHANGE PLATFORM</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label>Amount</label>
            <input type="number" placeholder="100" id="amount">
        </div>

        <div class="form-group">
            <label>From</label>
            <select id="from">
                <option value="USD">USD - $</option>
                <option value="EUR">EUR - €</option>
                <option value="RWF">RWF</option>
            </select>
        </div>

        <div class="form-group">
            <label>To</label>
            <select id="to">
                <option value="RWF">Rwanda - RWF</option>
                <option value="USD">USD - $</option>
                <option value="EUR">EUR - €</option>
            </select>
        </div>

        <button onclick="convert()">Convert</button>

        <div class="result">
            <p>Result</p>
            <h2 id="result">0</h2>
        </div>
    </div>

    <script>
        function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    let rate = 1030; // example rate

    let result;

    if (from === "USD" && to === "RWF") {
        result = amount * rate;
    } else if (from === "RWF" && to === "USD") {
        result = amount / rate;
    } else {
        result = amount;
    }

    document.getElementById("result").innerText = result.toLocaleString();
}
    </script>
</body>
</html>
