```
body {
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  height: 100vh;
  padding-top: 60px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  padding: 10px 15px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4338ca;
}

#taskdiv {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f9fafb;
  padding: 10px;
  border-radius: 8px;
  transition: 0.2s;
}

.task:hover {
  background: #eef2ff;
}

.task span {
  flex: 1;
  margin-left: 10px;
}

.completed span {
  text-decoration: line-through;
  color: gray;
}

.task button {
  background: #ef4444;
  padding: 5px 10px;
  font-size: 12px;
}

.task button:hover {
  background: #dc2626;
}

  </div>

  <script>
    function addTask() {
      const taskInput = document.getElementById('taskInput');
      const taskText = taskInput.value.trim();
      if (taskText === '') return;

      const taskDiv = document.createElement('div');
      taskDiv.classList.add('task');

      const textSpan = document.createElement('span');
      textSpan.textContent = taskText;

      taskDiv.onclick = function() {
        this.classList.toggle('completed');
        Taskcheckbox.checked = this.classList.contains('completed');
      };

      deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.type = 'button';

      deleteButton.onclick = function(e) {
        e.stopPropagation();
        this.parentElement.remove();
      };

      Taskcheckbox = document.createElement('input');
      Taskcheckbox.type = 'checkbox';

      Taskcheckbox.onclick = function(e) {
        e.stopPropagation();
        taskDiv.classList.toggle('completed');
        this.checked = taskDiv.classList.contains('completed');
      };

      taskDiv.appendChild(Taskcheckbox);
      taskDiv.appendChild(textSpan);
      taskDiv.appendChild(deleteButton);

      document.getElementById('taskdiv').appendChild(taskDiv);

      taskInput.value = '';
      taskInput.focus();
    }
  </script>
